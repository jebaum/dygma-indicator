version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dygma-indicator
    binary: dygma-indicator
    main: .
    env:
      # go.bug.st/serial/enumerator requires cgo on darwin. CGO_ENABLED=0
      # produces binaries that fail to link on macOS at build time. Release
      # darwin artifacts from a darwin runner (or drop darwin from goos)
      # if this config is run from a linux release host.
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-next'

aurs:
  - name: dygma-indicator-bin
    homepage: "https://github.com/jebaum/dygma-indicator"
    description: "A simple CLI utility to get the battery level of Dygma keyboards"
    maintainers:
      - "coolapso <coolapso@coolapso.tech>"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/dygma-indicator-bin.git"
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

announce:
  discord:
    enabled: true
